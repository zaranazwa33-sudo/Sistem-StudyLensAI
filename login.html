<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudyLens AI</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            font-family:'Poppins', sans-serif;
            background: linear-gradient(135deg, #dbeafe, #eff6ff);
        }

        .login-card{
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .brand{
            font-weight: 700;
            color: #2563eb;
        }

        .btn-primary{
            background:#2563eb;
            border:none;
            border-radius:12px;
            padding:12px;
            font-weight:600;
        }

        .btn-primary:hover{
            background:#1d4ed8;
        }

        input{
            border-radius:10px !important;
            padding:12px !important;
        }

        .text-small{
            font-size:14px;
        }
    </style>
</head>

<body>

<section class="vh-100 d-flex align-items-center">

<div class="container">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card login-card p-5">

<!-- HEADER -->
<div class="text-center mb-4">

<h2 class="brand">🎓 StudyLens AI</h2>
<p class="text-muted">Masuk untuk mulai belajar</p>

</div>

<!-- FORM -->
<form action="index.html" method="GET">

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Masukkan Email" required>
    </div>

    <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Masukkan Password" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">
        Masuk
    </button>

</form>

<!-- FOOTER -->
<div class="text-center mt-4 text-small">

Belum punya akun?
<a href="#" class="text-primary">Daftar</a>

</div>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
