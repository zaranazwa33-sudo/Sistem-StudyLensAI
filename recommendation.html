<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Personalized Recommendation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f9ff;
    font-family:Arial;
}

.card-box{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<div class="container py-5">

<h2>📊 Personalized Recommendation</h2>

<!-- INPUT WAJIB -->
<input id="inputText" class="form-control mt-3" placeholder="contoh: ai / web / database">

<button class="btn btn-primary mt-3" onclick="generateRec()">
Generate
</button>

<!-- OUTPUT -->
<div id="output" class="mt-4"></div>

</div>

<script>
function generateRec(){

// AMBIL INPUT
let input = document.getElementById("inputText").value.toLowerCase();
let output = document.getElementById("output");

// CEK KOSONG
if(input.trim() === ""){
alert("Isi dulu minat belajar!");
return;
}

// DEFAULT
let result = "📘 Belajar Dasar Umum Pemrograman";

// LOGIC SEDERHANA
if(input.includes("ai")){
result = `
🧠 Artificial Intelligence Dasar<br>
🤖 Machine Learning Intro<br>
📊 Data Science Basic
`;
}

else if(input.includes("web")){
result = `
🌐 HTML CSS Dasar<br>
⚙️ JavaScript Dasar<br>
🎨 UI Design Bootstrap
`;
}

else if(input.includes("database")){
result = `
🗄️ MySQL Dasar<br>
🔗 Relasi Database<br>
⚡ SQL Query Basic
`;
}

// OUTPUT PASTI MUNCUL
output.innerHTML = `
<div class="card-box mt-3">
<h5>Rekomendasi Untuk Kamu:</h5>
<hr>
${result}
</div>
`;

console.log("BUTTON KEPENCET - OK");
}
</script>

</body>
</html>
