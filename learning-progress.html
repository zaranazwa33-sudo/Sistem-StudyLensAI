<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Progress</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background:#EEF5FF;
    font-family:'Segoe UI',sans-serif;
}

.container{
    max-width:1100px;
    margin:40px auto;
}

.title{
    color:#2563EB;
    font-weight:bold;
    margin-bottom:30px;
}

.progress-card{
    background:#fff;
    border-radius:25px;
    padding:30px;
    margin-bottom:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.progress{
    height:18px;
    border-radius:20px;
}

.progress-bar{
    background:linear-gradient(90deg,#2563EB,#60A5FA);
}

.stat-box{
    background:white;
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.stat-box i{
    font-size:40px;
    color:#2563EB;
}

.stat-box h2{
    margin-top:15px;
    color:#2563EB;
}

</style>

</head>

<body>

<div class="container">

<h2 class="title">
<i class="bi bi-graph-up-arrow"></i>
Learning Progress
</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="stat-box">
<i class="bi bi-book"></i>
<h2>24</h2>
<p>Materi Dipelajari</p>
</div>
</div>

<div class="col-md-4">
<div class="stat-box">
<i class="bi bi-patch-check-fill"></i>
<h2>18</h2>
<p>Quiz Selesai</p>
</div>
</div>

<div class="col-md-4">
<div class="stat-box">
<i class="bi bi-award-fill"></i>
<h2>92%</h2>
<p>Progress</p>
</div>
</div>

</div>

<div class="progress-card mt-4">

<h4>Progress Belajar</h4>

<div class="progress mt-4">
<div class="progress-bar" style="width:92%">92%</div>
</div>

<p class="mt-3">
Selamat! Progress belajar kamu sudah mencapai <b>92%</b>.
</p>

</div>

</div>

</body>
</html>
