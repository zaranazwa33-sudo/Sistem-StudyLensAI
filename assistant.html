<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AI Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#eef5ff;}

.chat{
height:400px;
overflow:auto;
background:white;
padding:15px;
border-radius:12px;
}
.user{text-align:right;}
.ai{text-align:left;}
.bubble{
display:inline-block;
padding:8px 12px;
border-radius:10px;
margin:5px;
}
.user .bubble{background:#2563eb;color:white;}
.ai .bubble{background:#e5e7eb;}
</style>
</head>

<body>

<div class="container py-4">

<h2>🤖 AI Assistant</h2>

<div id="chat" class="chat"></div>

<div class="d-flex mt-3 gap-2">
<input id="msg" class="form-control" placeholder="Tanya AI...">
<button class="btn btn-primary" onclick="send()">Kirim</button>
</div>

</div>

<script>
function send(){

let msg = document.getElementById("msg").value;
let chat = document.getElementById("chat");

if(msg.trim()=="") return;

chat.innerHTML += `<div class='user'><div class='bubble'>${msg}</div></div>`;

let reply = "Saya belum paham.";

if(msg.includes("ai")) reply="AI adalah kecerdasan buatan.";
if(msg.includes("quiz")) reply="Quiz bisa dibuat otomatis dari materi.";
if(msg.includes("summary")) reply="Summary merangkum materi panjang.";

setTimeout(()=>{
chat.innerHTML += `<div class='ai'><div class='bubble'>🤖 ${reply}</div></div>`;
chat.scrollTop = chat.scrollHeight;
},500);

document.getElementById("msg").value="";
}
</script>

</body>
</html>
