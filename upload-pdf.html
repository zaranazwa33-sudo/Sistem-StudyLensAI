<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload PDF</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
background:#EEF5FF;
font-family:'Segoe UI',sans-serif;
}

.container{
max-width:700px;
margin:60px auto;
}

.upload-box{

background:white;
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.08);

}

.upload-icon{

font-size:80px;
color:#2563EB;
margin-bottom:20px;

}

.btn-upload{

background:#2563EB;
color:white;
padding:12px 35px;
border:none;
border-radius:30px;

}

.btn-upload:hover{

background:#1D4ED8;

}

</style>

</head>

<body>

<div class="container">

<div class="upload-box">

<i class="bi bi-cloud-arrow-up-fill upload-icon"></i>

<h2>Upload PDF</h2>

<p>
Silakan unggah file PDF untuk diproses oleh AI Summary dan AI Quiz.
</p>

<input type="file" class="form-control mt-4" accept=".pdf">

<button class="btn-upload mt-4">
<i class="bi bi-upload"></i>
Upload File
</button>

</div>

</div>

</body>
</html>
